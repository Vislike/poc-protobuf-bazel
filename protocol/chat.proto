syntax = "proto3";

package poc.protocol;

message ChatMessage {
  string text = 1;
  string channel_id = 2;
}

message SystemMessage { string alert_level = 1; }

message Message {
  string message_id = 1;
  int64 timestamp_utc = 2;
  string sender_id = 3;

  oneof payload {
    ChatMessage chat = 4;
    SystemMessage system = 5;
  }
}